<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Home Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #F7F4EA;
      --surface:   rgba(222,217,226,0.58);
      --accent:    #80A1D4;
      --accent-lt: #C0B9DD;
      --text:      #252338;
      --muted:     #7c7a9e;
      --border:    rgba(192,185,221,0.42);
      --radius:    18px;
      --gap:       11px;
      --blur:      blur(16px);
    }
    body.night {
      --bg:        #14121e;
      --surface:   rgba(32,28,50,0.82);
      --accent:    #7a9fd0;
      --accent-lt: #3d4870;
      --text:      #dddaf0;
      --muted:     #8a87b0;
      --border:    rgba(122,159,208,0.18);
    }
    body.night.has-bg::before { background: rgba(14,12,22,0.55); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Outfit', system-ui, sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
    body { background-color: var(--bg); background-image: var(--custom-bg); background-size: cover; background-position: center; transition: background-color 2s ease; }
    body.has-bg::before { content: ''; position: fixed; inset: 0; background: rgba(247,244,234,0.45); z-index: 0; pointer-events: none; }

    /* ── LAYOUT ── */
    .shell { position: relative; z-index: 1; width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: var(--gap); gap: var(--gap); }

    .header { flex: 0 0 auto; height: 62px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 4px; }
    .header-date { font-size: 13px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .header-clock { font-size: 56px; font-weight: 400; letter-spacing: -0.02em; line-height: 1; color: var(--text); text-align: center; }
    .header-location { display: flex; align-items: center; justify-content: flex-end; gap: 10px; font-size: 13px; font-weight: 500; color: var(--muted); }

    .main { flex: 1; min-height: 0; display: grid; grid-template-columns: 38% 1fr; gap: var(--gap); }
    .col { display: flex; flex-direction: column; gap: var(--gap); min-height: 0; }

    .card { background: var(--surface); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    /* ── WEATHER ── */
    .weather-card { flex: 0 0 54%; padding: 0; background: linear-gradient(160deg,#1c3d7a 0%,#2e6bbf 55%,#4a8fd4 100%); border: none; position: relative; }
    body.night .weather-card { background: linear-gradient(160deg,#0e1e3d 0%,#182e5a 55%,#1f4070 100%); }
    .wx-inner { position: absolute; inset: 0; padding: 16px 18px 14px; display: flex; gap: 14px; color: #fff; }
    .wx-left { display: flex; flex-direction: column; justify-content: space-between; flex: 0 0 auto; min-width: 140px; }
    .wx-location { font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; opacity: 0.75; }
    .wx-temp-big { font-size: 82px; font-weight: 300; line-height: 1; letter-spacing: -0.04em; }
    .wx-bottom-left { display: flex; flex-direction: column; gap: 2px; }
    .wx-cond { font-size: 14px; font-weight: 600; opacity: 0.9; }
    .wx-hl   { font-size: 12px; font-weight: 500; opacity: 0.65; }
    .wx-divider { width: 1px; background: rgba(255,255,255,0.2); flex-shrink: 0; margin: 4px 0; }
    .wx-hourly { flex: 1; display: flex; flex-direction: column; justify-content: space-between; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .wx-hourly::-webkit-scrollbar { display: none; }
    .wx-hour { display: flex; align-items: center; gap: 8px; }
    .wx-h-time { font-size: 11px; font-weight: 500; opacity: 0.7; width: 36px; flex-shrink: 0; }
    .wx-h-icon { font-size: 16px; flex-shrink: 0; }
    .wx-h-temp { font-size: 13px; font-weight: 500; margin-left: auto; }
    .weather-loading { font-size: 13px; color: rgba(255,255,255,0.7); text-align: center; padding: 8px; }

    /* ── AI CHAT ── */
    .chat-card { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 0; }
    .chat-tabs { display: flex; gap: 5px; padding: 10px 12px 8px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .chat-tab { flex: 1; padding: 6px 4px; border-radius: 9px; border: none; font-size: 11px; font-weight: 500; font-family: inherit; cursor: pointer; background: transparent; color: var(--muted); transition: background 0.15s, color 0.15s; -webkit-tap-highlight-color: transparent; }
    .chat-tab.active { background: var(--accent); color: #fff; }
    .chat-messages { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 14px; display: flex; flex-direction: column; gap: 5px; }
    .chat-placeholder { color: var(--muted); font-size: 12px; font-style: italic; text-align: center; align-self: center; margin: auto 0; }
    .chat-bubble { padding: 7px 10px; border-radius: 11px; font-size: 12px; line-height: 1.45; max-width: 92%; word-break: break-word; }
    .chat-bubble.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
    .chat-bubble.assistant { background: rgba(127,163,190,0.15); color: var(--text); align-self: flex-start; border-bottom-left-radius: 3px; }
    .chat-bubble.loading { color: var(--muted); font-style: italic; }
    .chat-input-row { display: flex; align-items: center; gap: 7px; padding: 8px 12px 12px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .chat-input { flex: 1; padding: 8px 10px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.65); color: var(--text); font-size: 12px; font-family: inherit; outline: none; }
    .chat-input:focus { border-color: var(--accent); }
    .chat-send { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--accent); color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s; }
    .chat-send:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── THIS DAY IN HISTORY ── */
    .history-card { flex: 0 0 auto; max-height: 26%; padding: 14px 16px 12px; display: flex; flex-direction: column; gap: 8px; }
    .history-header { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
    .history-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 9px; scrollbar-width: none; }
    .history-list::-webkit-scrollbar { display: none; }
    .history-item { display: flex; gap: 8px; align-items: flex-start; }
    .history-year { font-size: 11px; font-weight: 700; color: var(--accent); flex-shrink: 0; min-width: 34px; padding-top: 1px; }
    .history-text { font-size: 11px; line-height: 1.4; color: var(--text); }

    /* ── SPOTIFY ── */
    .spotify-card { flex: 1; min-height: 0; display: flex; flex-direction: column; background: #0e0e0e; border: 1px solid rgba(255,255,255,0.06); color: #fff; padding: 0; }

    .sp-tabs-scroll { flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .sp-tabs-scroll::-webkit-scrollbar { display: none; }
    .sp-tabs { display: flex; gap: 4px; padding: 10px 12px 8px; min-width: max-content; }
    .sp-tab { padding: 5px 13px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); font-size: 11px; font-weight: 600; font-family: inherit; cursor: pointer; background: transparent; color: rgba(255,255,255,0.5); white-space: nowrap; transition: background 0.15s, color 0.15s, border-color 0.15s; -webkit-tap-highlight-color: transparent; }
    .sp-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .sp-login { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 24px; }
    .sp-login-icon { font-size: 44px; opacity: 0.35; }
    .sp-login-msg { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; line-height: 1.5; max-width: 220px; }
    .sp-login-btn { padding: 13px 32px; border-radius: 30px; border: none; background: #1DB954; color: #000; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; letter-spacing: 0.02em; -webkit-tap-highlight-color: transparent; transition: opacity 0.15s; }
    .sp-login-btn:active { opacity: 0.8; }

    /* Player: track list + now-playing bar */
    .sp-player { flex: 1; min-height: 0; display: none; flex-direction: column; }

    /* Scrollable track list */
    .sp-tracklist { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 6px 0; }
    .sp-tracklist::-webkit-scrollbar { display: none; }

    .sp-track-item { display: flex; align-items: center; gap: 10px; padding: 7px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.12s; }
    .sp-track-item:active { background: rgba(255,255,255,0.06); }
    .sp-track-item.playing { background: rgba(128,161,212,0.12); }

    .sp-ti-num { font-size: 11px; color: rgba(255,255,255,0.3); width: 18px; text-align: right; flex-shrink: 0; }
    .sp-track-item.playing .sp-ti-num { color: var(--accent); }

    .sp-ti-info { flex: 1; min-width: 0; }
    .sp-ti-name { font-size: 13px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-track-item.playing .sp-ti-name { color: var(--accent); }
    .sp-ti-artist { font-size: 11px; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    .sp-ti-dur { font-size: 11px; color: rgba(255,255,255,0.3); flex-shrink: 0; }

    /* Now-playing bar */
    .sp-nowplaying { flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.08); padding: 10px 14px 0; display: flex; align-items: center; gap: 10px; }
    .sp-np-art { width: 36px; height: 36px; border-radius: 5px; object-fit: cover; background: #1a1a1a; flex-shrink: 0; }
    .sp-np-info { flex: 1; min-width: 0; }
    .sp-np-track  { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-np-artist { font-size: 11px; color: rgba(255,255,255,0.45); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .sp-btn { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 20px; cursor: pointer; padding: 6px; -webkit-tap-highlight-color: transparent; transition: color 0.15s, transform 0.1s; line-height: 1; }
    .sp-btn:active { transform: scale(0.88); }
    .sp-btn-play { font-size: 28px; color: #fff; }

    /* Progress bar below now-playing */
    .sp-progress-wrap { flex-shrink: 0; padding: 6px 14px 10px; }
    .sp-progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; cursor: pointer; }
    .sp-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.5s linear; }
    .sp-times { display: flex; justify-content: space-between; margin-top: 3px; font-size: 10px; color: rgba(255,255,255,0.3); }

    /* ── SETTINGS ── */
    .settings-trigger { position: relative; flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.35); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border); color: var(--muted); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0.45; transition: opacity 0.2s; -webkit-tap-highlight-color: transparent; }
    .settings-trigger:hover, .settings-trigger:active { opacity: 1; }
    .settings-panel { position: fixed; top: 54px; right: 14px; width: 300px; background: rgba(238,242,247,0.97); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; z-index: 201; box-shadow: 0 8px 40px rgba(42,61,82,0.18); display: none; }
    .settings-panel.open { display: block; }
    .s-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
    .s-section { margin-bottom: 14px; }
    .s-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 5px; }
    .s-input { width: 100%; padding: 8px 10px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.85); color: var(--text); font-size: 12px; font-family: inherit; outline: none; margin-bottom: 6px; }
    .s-input:focus { border-color: var(--accent); }
    .s-file-label { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 8px; border-radius: 10px; border: 1px dashed var(--accent-lt); background: rgba(127,163,190,0.08); color: var(--muted); font-size: 12px; font-family: inherit; cursor: pointer; margin-bottom: 6px; transition: background 0.15s; }
    .s-file-label:hover { background: rgba(127,163,190,0.16); }
    #bg-file { display: none; }
    .s-row { display: flex; gap: 7px; }
    .btn { flex: 1; padding: 8px; border-radius: 10px; border: none; font-size: 12px; font-weight: 500; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: rgba(127,163,190,0.15); color: var(--muted); }
    .s-divider { height: 1px; background: var(--border); margin: 12px 0; }
  </style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="header-date" id="date-display">—</div>
    <div class="header-clock" id="clock-display">—</div>
    <div class="header-location">
      <span>Brooklyn, NY</span>
      <button class="settings-trigger" id="settings-btn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <div class="main">

    <!-- LEFT: Weather + Chat -->
    <div class="col">

      <div class="card weather-card" id="weather-card">
        <div id="weather-content" class="wx-inner">
          <div class="weather-loading">Loading weather…</div>
        </div>
      </div>

      <div class="card chat-card">
        <div class="chat-tabs">
          <button class="chat-tab active" data-model="claude">Claude</button>
          <button class="chat-tab" data-model="chatgpt">ChatGPT</button>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="chat-placeholder" id="chat-placeholder">Add API keys in ⚙ to chat</div>
        </div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" type="text" placeholder="Ask anything…" autocomplete="off">
          <button class="chat-send" id="chat-send">↑</button>
        </div>
      </div>

    </div>

    <!-- RIGHT: History + Spotify -->
    <div class="col">

      <div class="card history-card">
        <div class="history-header">On This Day</div>
        <div class="history-list" id="history-list">
          <div style="font-size:11px;color:var(--muted)">Loading…</div>
        </div>
      </div>

      <div class="card spotify-card">

        <div class="sp-tabs-scroll">
          <div class="sp-tabs" id="sp-tabs">
            <button class="sp-tab active" data-playlist="50hFiVZysrkzXjUq1J67JZ">Playlist 1</button>
            <button class="sp-tab" data-playlist="0vPhkZm5Rw9pBNJJqBy6DL">Playlist 2</button>
            <button class="sp-tab" data-playlist="7andkYPK1ycMjXk6AUOTaJ">Playlist 3</button>
            <button class="sp-tab" data-playlist="1kqpsHewuB8XXWPoXnrqoJ">Playlist 4</button>
          </div>
        </div>

        <div class="sp-login" id="sp-login">
          <div class="sp-login-icon">🎵</div>
          <div class="sp-login-msg">Connect your Spotify Premium account to play music directly on this display.</div>
          <button class="sp-login-btn" id="sp-login-btn">Connect Spotify</button>
        </div>

        <div class="sp-player" id="sp-player">
          <!-- Scrollable track list -->
          <div class="sp-tracklist" id="sp-tracklist">
            <div style="padding:16px;font-size:12px;color:rgba(255,255,255,0.3)">Loading tracks…</div>
          </div>

          <!-- Now-playing bar -->
          <div class="sp-nowplaying">
            <img class="sp-np-art" id="sp-art" src="" alt="">
            <div class="sp-np-info">
              <div class="sp-np-track" id="sp-track">—</div>
              <div class="sp-np-artist" id="sp-artist">—</div>
            </div>
            <div class="sp-controls">
              <button class="sp-btn" id="sp-prev">⏮</button>
              <button class="sp-btn sp-btn-play" id="sp-play">▶</button>
              <button class="sp-btn" id="sp-next">⏭</button>
            </div>
          </div>

          <!-- Progress -->
          <div class="sp-progress-wrap">
            <div class="sp-progress-bar" id="sp-progress-bar">
              <div class="sp-progress-fill" id="sp-progress-fill"></div>
            </div>
            <div class="sp-times">
              <span id="sp-pos">0:00</span>
              <span id="sp-dur">0:00</span>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- Settings -->
<div class="settings-panel" id="settings-panel">
  <div class="s-title">Display Settings</div>
  <div class="s-section">
    <label class="s-label">Background</label>
    <label class="s-file-label" for="bg-file">📁 Upload image from device</label>
    <input type="file" id="bg-file" accept="image/*">
    <input class="s-input" type="url" id="bg-url-input" placeholder="Or paste an image URL…">
  </div>
  <div class="s-divider"></div>
  <div class="s-section">
    <label class="s-label" for="claude-key-input">Claude API Key</label>
    <input class="s-input" type="password" id="claude-key-input" placeholder="sk-ant-…">
  </div>
  <div class="s-section">
    <label class="s-label" for="openai-key-input">OpenAI API Key</label>
    <input class="s-input" type="password" id="openai-key-input" placeholder="sk-…">
    <div style="font-size:10px;color:var(--muted);line-height:1.4;">Keys stored on device only. <strong>console.anthropic.com</strong> / <strong>platform.openai.com</strong></div>
  </div>
  <div class="s-row">
    <button class="btn btn-primary" id="settings-save">Save</button>
    <button class="btn btn-ghost" id="bg-clear">Clear BG</button>
  </div>
</div>

<script>
'use strict';

// ── CLOCK ─────────────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function tick() {
  const now = new Date(), h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-display').textContent = `${h%12||12}:${m} ${h>=12?'PM':'AM'}`;
  document.getElementById('date-display').textContent  = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
}
tick(); setInterval(tick, 1000);

// ── NIGHT MODE ────────────────────────────────────────────────────
function updateNightMode() { const h = new Date().getHours(); document.body.classList.toggle('night', h >= 21 || h < 7); }
updateNightMode(); setInterval(updateNightMode, 60000);

// ── WEATHER ───────────────────────────────────────────────────────
const WMO = {
  0:['☀️','Clear'],1:['🌤','Mostly Clear'],2:['⛅','Partly Cloudy'],3:['☁️','Overcast'],
  45:['🌫','Foggy'],48:['🌫','Icy Fog'],
  51:['🌦','Light Drizzle'],53:['🌦','Drizzle'],55:['🌧','Heavy Drizzle'],
  61:['🌧','Light Rain'],63:['🌧','Rain'],65:['🌧','Heavy Rain'],
  71:['❄️','Light Snow'],73:['❄️','Snow'],75:['❄️','Heavy Snow'],
  80:['🌦','Showers'],81:['🌧','Showers'],82:['⛈','Heavy Showers'],
  95:['⛈','Thunderstorm'],96:['⛈','Thunderstorm'],99:['⛈','Thunderstorm'],
};
function fmtHour(iso) { const h = new Date(iso).getHours(); return h===0?'12AM':h<12?`${h}AM`:h===12?'12PM':`${h-12}PM`; }
function renderWeather(d) {
  const cur = d.current, [icon,cond] = WMO[cur.weathercode]??['🌡','—'];
  const temp=Math.round(cur.temperature_2m), hi=Math.round(d.daily.temperature_2m_max[0]), lo=Math.round(d.daily.temperature_2m_min[0]);
  const curHr=new Date().getHours(), times=d.hourly.time, temps=d.hourly.temperature_2m, codes=d.hourly.weathercode;
  const start=times.findIndex(t=>new Date(t).getHours()>=curHr);
  const slots=[];
  for(let i=start;i<start+6&&i<times.length;i++){const[hIcon]=WMO[codes[i]]??['🌡'];slots.push({time:fmtHour(times[i]),icon:hIcon,temp:Math.round(temps[i])});}
  document.getElementById('weather-content').innerHTML=`
    <div class="wx-left">
      <div class="wx-location">Brooklyn</div>
      <div class="wx-temp-big">${temp}°</div>
      <div class="wx-bottom-left"><div class="wx-cond">${icon} ${cond}</div><div class="wx-hl">H:${hi}° L:${lo}°</div></div>
    </div>
    <div class="wx-divider"></div>

// ── SPOTIFY PKCE + WEB PLAYBACK SDK ──────────────────────────────
const SP_CLIENT_ID  = '5ce0336d0df443b4a3adad36aeb9a658';
const SP_REDIRECT   = 'https://dani-rose-fish.github.io/bathroom-display/';
const SP_SCOPES     = 'streaming user-read-email user-read-private user-modify-playback-state user-read-playback-state playlist-read-private';
const SP_PLAYLISTS  = ['50hFiVZysrkzXjUq1J67JZ','0vPhkZm5Rw9pBNJJqBy6DL','7andkYPK1ycMjXk6AUOTaJ','1kqpsHewuB8XXWPoXnrqoJ'];

let spPlayer=null, spDeviceId=null, spCurrentMs=0, spDurationMs=0, spPlaying=false, spProgressInt=null;
let spActivePlaylist=SP_PLAYLISTS[0], spCurrentTrackUri=null, spPlaylistTracks=[];

function rndStr(len) {
  const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  return Array.from(crypto.getRandomValues(new Uint8Array(len)),x=>c[x%c.length]).join('');
}
async function sha256(s) { return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)); }
function b64url(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_'); }

async function spLogin() {
  const verifier=rndStr(64), challenge=b64url(await sha256(verifier));
  localStorage.setItem('sp_verifier',verifier);
  const p=new URLSearchParams({response_type:'code',client_id:SP_CLIENT_ID,scope:SP_SCOPES,code_challenge_method:'S256',code_challenge:challenge,redirect_uri:SP_REDIRECT});
  window.location=`https://accounts.spotify.com/authorize?${p}`;
}

async function spGetToken(code) {
  const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:SP_CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:SP_REDIRECT,code_verifier:localStorage.getItem('sp_verifier')})});
  return res.json();
}

async function spRefresh() {
  const rt=localStorage.getItem('sp_refresh'); if(!rt) return null;
  const res=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({grant_type:'refresh_token',refresh_token:rt,client_id:SP_CLIENT_ID})});
  const d=await res.json();
  if(d.access_token){localStorage.setItem('sp_token',d.access_token);if(d.refresh_token)localStorage.setItem('sp_refresh',d.refresh_token);return d.access_token;}
  return null;
}

function spTok() { return localStorage.getItem('sp_token'); }

async function spApi(method,path,body) {
  let tok=spTok();
  const go=t=>fetch(`https://api.spotify.com/v1${path}`,{method,headers:{'Authorization':`Bearer ${t}`,'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  let res=await go(tok);
  if(res.status===401){tok=await spRefresh();if(!tok){showSpLogin();return null;}res=await go(tok);}
  if(res.status===204||res.status===202||res.status===200&&res.headers.get('content-length')==='0') return null;
  return res.json().catch(()=>null);
}

function showSpLogin() { document.getElementById('sp-login').style.display='flex'; document.getElementById('sp-player').style.display='none'; }
function showSpPlayer(){ document.getElementById('sp-login').style.display='none'; document.getElementById('sp-player').style.display='flex'; }

function fmtMs(ms){ const s=Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function tickProgress() {
  if(!spPlaying) return;
  spCurrentMs=Math.min(spCurrentMs+500,spDurationMs);
  const pct=spDurationMs>0?(spCurrentMs/spDurationMs*100):0;
  document.getElementById('sp-progress-fill').style.width=`${pct}%`;
  document.getElementById('sp-pos').textContent=fmtMs(spCurrentMs);
}

function updatePlayerState(state) {
  if(!state) return;
  const track=state.track_window?.current_track; if(!track) return;
  document.getElementById('sp-track').textContent=track.name;
  document.getElementById('sp-artist').textContent=track.artists?.map(a=>a.name).join(', ')??'—';
  const art=track.album?.images?.[0]?.url;
  const artEl=document.getElementById('sp-art');
  artEl.src=art??''; artEl.style.opacity=art?'1':'0';
  spCurrentMs=state.position; spDurationMs=state.duration; spPlaying=!state.paused;
  document.getElementById('sp-play').textContent=spPlaying?'⏸':'▶';
  document.getElementById('sp-progress-fill').style.width=`${spDurationMs>0?spCurrentMs/spDurationMs*100:0}%`;
  document.getElementById('sp-pos').textContent=fmtMs(spCurrentMs);
  document.getElementById('sp-dur').textContent=fmtMs(spDurationMs);
  clearInterval(spProgressInt); if(spPlaying) spProgressInt=setInterval(tickProgress,500);
  // Highlight current track in list
  if(track.uri !== spCurrentTrackUri) {
    spCurrentTrackUri=track.uri;
    document.querySelectorAll('.sp-track-item').forEach(el=>{
      el.classList.toggle('playing', el.dataset.uri===track.uri);
    });
    // Scroll playing track into view
    const playing=document.querySelector('.sp-track-item.playing');
    if(playing) playing.scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}

async function fetchPlaylistTracks(playlistId) {
  document.getElementById('sp-tracklist').innerHTML='<div style="padding:16px;font-size:12px;color:rgba(255,255,255,0.3)">Loading…</div>';
  const data=await spApi('GET',`/playlists/${playlistId}/tracks?limit=50&fields=items(track(id,name,uri,duration_ms,artists(name)))`);
  if(!data?.items) return;
  spPlaylistTracks=data.items.map(i=>i.track).filter(Boolean);
  document.getElementById('sp-tracklist').innerHTML=spPlaylistTracks.map((t,i)=>`
    <div class="sp-track-item${t.uri===spCurrentTrackUri?' playing':''}" data-uri="${t.uri}" data-idx="${i}">
      <span class="sp-ti-num">${i+1}</span>
      <div class="sp-ti-info">
        <div class="sp-ti-name">${t.name}</div>
        <div class="sp-ti-artist">${t.artists?.map(a=>a.name).join(', ')??''}</div>
      </div>
      <span class="sp-ti-dur">${fmtMs(t.duration_ms)}</span>
    </div>`).join('');
  document.querySelectorAll('.sp-track-item').forEach(el=>{
    el.addEventListener('click',()=>{
      spApi('PUT','/me/player/play',{context_uri:`spotify:playlist:${playlistId}`,offset:{uri:el.dataset.uri}});
    });
  });
}

function initSDK() {
  window.onSpotifyWebPlaybackSDKReady=()=>{
    spPlayer=new Spotify.Player({
      name:'Bathroom Display',
      getOAuthToken:cb=>{const t=spTok();if(t)cb(t);else spRefresh().then(nt=>{if(nt)cb(nt);});},
      volume:0.7,
    });
    spPlayer.addListener('ready',({device_id})=>{
      spDeviceId=device_id; showSpPlayer();
      fetchPlaylistTracks(spActivePlaylist);
    });
    spPlayer.addListener('not_ready',()=>{spDeviceId=null;});
    spPlayer.addListener('player_state_changed',updatePlayerState);
    spPlayer.addListener('initialization_error',()=>showSpLogin());
    spPlayer.addListener('authentication_error',async()=>{const t=await spRefresh();if(!t)showSpLogin();});
    spPlayer.addListener('account_error',()=>{
      document.querySelector('.sp-login-msg').textContent='Spotify Premium is required for playback.';
      showSpLogin();
    });
    spPlayer.connect();
  };
  const s=document.createElement('script'); s.src='https://sdk.scdn.co/spotify-player.js'; document.body.appendChild(s);
}

async function loadPlaylist(id) {
  fetchPlaylistTracks(id);
  if(!spDeviceId) return;
  await spApi('PUT','/me/player/play',{context_uri:`spotify:playlist:${id}`});
}

// Playlist tab names
async function loadPlaylistNames() {
  const tabs=document.querySelectorAll('.sp-tab');
  for(let i=0;i<SP_PLAYLISTS.length;i++){
    try{
      const d=await(await fetch(`https://open.spotify.com/oembed?url=https://open.spotify.com/playlist/${SP_PLAYLISTS[i]}`)).json();
      if(d.title&&tabs[i]) tabs[i].textContent=d.title.length>16?d.title.slice(0,14)+'…':d.title;
    }catch(e){}
  }
}
loadPlaylistNames();

// Tab switching
document.querySelectorAll('.sp-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.sp-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');

// Controls
document.getElementById('sp-prev').addEventListener('click',()=>spPlayer?.previousTrack());
document.getElementById('sp-next').addEventListener('click',()=>spPlayer?.nextTrack());
document.getElementById('sp-play').addEventListener('click',()=>spPlayer?.togglePlay());
document.getElementById('sp-progress-bar').addEventListener('click',e=>{
  if(!spDurationMs||!spPlayer) return;
  const rect=e.currentTarget.getBoundingClientRect();
  spPlayer.seek(Math.floor((e.clientX-rect.left)/rect.width*spDurationMs));
});
document.getElementById('sp-login-btn').addEventListener('click',spLogin);

// OAuth callback + init
(async()=>{
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code'), error=params.get('error');
  if(error){ window.history.replaceState({},'',window.location.pathname); return; }
  if(code){
    window.history.replaceState({},'',window.location.pathname);
    const data=await spGetToken(code);
    if(data.access_token){ localStorage.setItem('sp_token',data.access_token); localStorage.setItem('sp_refresh',data.refresh_token); initSDK(); }
    else showSpLogin();
    return;
  }
  if(spTok()) initSDK(); else showSpLogin();
})();

// Refresh token every 45 min
setInterval(async()=>{ const t=await spRefresh(); if(!t) showSpLogin(); }, 45*60*1000);

// ── SETTINGS ──────────────────────────────────────────────────────
const BG_KEY='bathroom-bg', CLAUDE_KEY='claude-api-key', OPENAI_KEY='openai-api-key';
function applyBg(src){ if(src){document.body.style.setProperty('--custom-bg',`url("${src}")`);document.body.classList.add('has-bg');}else{document.body.style.removeProperty('--custom-bg');document.body.classList.remove('has-bg');} }
const savedBg=localStorage.getItem(BG_KEY), savedCK=localStorage.getItem(CLAUDE_KEY), savedOK=localStorage.getItem(OPENAI_KEY);
if(savedBg){applyBg(savedBg);if(!savedBg.startsWith('data:'))document.getElementById('bg-url-input').value=savedBg;}
if(savedCK) document.getElementById('claude-key-input').value=savedCK;
if(savedOK) document.getElementById('openai-key-input').value=savedOK;
if(savedCK||savedOK) document.getElementById('chat-placeholder').textContent='Ask me anything…';

const settingsBtn=document.getElementById('settings-btn'), settingsPanel=document.getElementById('settings-panel');
settingsBtn.addEventListener('click',e=>{e.stopPropagation();settingsPanel.classList.toggle('open');});
document.addEventListener('click',e=>{if(!settingsPanel.contains(e.target)&&e.target!==settingsBtn)settingsPanel.classList.remove('open');});
document.getElementById('bg-file').addEventListener('change',function(){
  const file=this.files?.[0]; if(!file) return;
  const reader=new FileReader(); reader.onload=e=>{document.getElementById('bg-url-input').value='';applyBg(e.target.result);localStorage.setItem(BG_KEY,e.target.result);}; reader.readAsDataURL(file);
});
document.getElementById('settings-save').addEventListener('click',()=>{
  const url=document.getElementById('bg-url-input').value.trim();
  if(url){localStorage.setItem(BG_KEY,url);applyBg(url);}
  const ck=document.getElementById('claude-key-input').value.trim(), ok=document.getElementById('openai-key-input').value.trim();
  if(ck)localStorage.setItem(CLAUDE_KEY,ck);else localStorage.removeItem(CLAUDE_KEY);
  if(ok)localStorage.setItem(OPENAI_KEY,ok);else localStorage.removeItem(OPENAI_KEY);
  if(ck||ok) document.getElementById('chat-placeholder').textContent='Ask me anything…';
  settingsPanel.classList.remove('open');
});
document.getElementById('bg-clear').addEventListener('click',()=>{
  localStorage.removeItem(BG_KEY); document.getElementById('bg-url-input').value=''; document.getElementById('bg-file').value=''; applyBg(null); settingsPanel.classList.remove('open');
});

// ── AI CHAT ───────────────────────────────────────────────────────
let activeModel='claude';
const chatHistory={claude:[],chatgpt:[]};

document.querySelectorAll('.chat-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.chat-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active'); activeModel=tab.dataset.model; renderChat();
  });
});

function renderChat(){
  const box=document.getElementById('chat-messages'), hist=chatHistory[activeModel];
  if(!hist.length){
    const hasKey=activeModel==='claude'?localStorage.getItem(CLAUDE_KEY):localStorage.getItem(OPENAI_KEY);
    box.innerHTML=`<div class="chat-placeholder">${hasKey?'Ask me anything…':'Add API key in ⚙ to chat'}</div>`;
    return;
  }
  box.innerHTML=hist.map(m=>`<div class="chat-bubble ${m.role==='user'?'user':'assistant'}">${m.content}</div>`).join('');
  box.scrollTop=box.scrollHeight;
}

async function sendChat(){
  const input=document.getElementById('chat-input'), sendBtn=document.getElementById('chat-send');
  const text=input.value.trim(); if(!text) return;
  const ck=localStorage.getItem(CLAUDE_KEY), ok=localStorage.getItem(OPENAI_KEY);
  if(activeModel==='claude'&&!ck){document.getElementById('chat-placeholder').textContent='Add Claude API key in ⚙ Settings';return;}
  if(activeModel==='chatgpt'&&!ok){document.getElementById('chat-placeholder').textContent='Add OpenAI API key in ⚙ Settings';return;}
  chatHistory[activeModel].push({role:'user',content:text});
  input.value=''; sendBtn.disabled=true; renderChat();
  const box=document.getElementById('chat-messages');
  const dot=document.createElement('div'); dot.className='chat-bubble loading'; dot.textContent='…'; box.appendChild(dot); box.scrollTop=box.scrollHeight;
  try{
    let reply='';
    if(activeModel==='claude'){
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ck,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:512,system:'You are a helpful assistant. Keep responses concise.',messages:chatHistory[activeModel].map(m=>({role:m.role,content:m.content}))})});
      const d=await r.json(); reply=d.content?.[0]?.text??`Error: ${d.error?.message??'unknown'}`;
    }else{
      const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${ok}`},
        body:JSON.stringify({model:'gpt-4o-mini',max_tokens:512,messages:[{role:'system',content:'You are a helpful assistant. Keep responses concise.'},...chatHistory[activeModel].map(m=>({role:m.role,content:m.content}))]})});
      const d=await r.json(); reply=d.choices?.[0]?.message?.content??`Error: ${d.error?.message??'unknown'}`;
    }
    chatHistory[activeModel].push({role:'assistant',content:reply});
    if(chatHistory[activeModel].length>6) chatHistory[activeModel]=chatHistory[activeModel].slice(-6);
  }catch(e){chatHistory[activeModel].push({role:'assistant',content:'Network error.'});}
  finally{sendBtn.disabled=false;renderChat();}
}

document.getElementById('chat-send').addEventListener('click',sendChat);
document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}});
</script>
