<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Home Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── DAY PALETTE (Floral White / Lavender / Periwinkle / Wisteria / Pearl Aqua) ── */
    :root {
      --bg:          #F7F4EA;
      --surface:     rgba(222,217,226,0.58);
      --accent:      #80A1D4;
      --accent-lt:   #C0B9DD;
      --accent2:     #75C9C8;
      --text:        #252338;
      --muted:       #7c7a9e;
      --border:      rgba(192,185,221,0.42);
      --radius:      18px;
      --gap:         11px;
      --blur:        blur(16px);
    }

    /* ── NIGHT PALETTE — auto after 9 PM, off at 7 AM ── */
    body.night {
      --bg:          #14121e;
      --surface:     rgba(32,28,50,0.82);
      --accent:      #7a9fd0;
      --accent-lt:   #3d4870;
      --accent2:     #4a9898;
      --text:        #dddaf0;
      --muted:       #8a87b0;
      --border:      rgba(122,159,208,0.18);
    }

    body.night.has-bg::before { background: rgba(14,12,22,0.55); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg);
      background-image: var(--custom-bg);
      background-size: cover;
      background-position: center;
      transition: background-color 2s ease;
    }

    body.has-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(247,244,234,0.45);
      z-index: 0;
      pointer-events: none;
    }

    /* ── LAYOUT ── */

    .shell {
      position: relative;
      z-index: 1;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      padding: var(--gap);
      gap: var(--gap);
    }

    /* ── HEADER ── */

    .header {
      flex: 0 0 auto;
      height: 62px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 4px;
    }

    .header-date {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .header-clock {
      font-size: 56px;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
      text-align: center;
    }

    .header-location {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    /* ── MAIN ── */

    .main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 42% 1fr;
      gap: var(--gap);
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
      min-height: 0;
    }

    /* ── GENERIC CARD ── */

    .card {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── SPOTIFY ── */

    .spotify-wrap {
      flex: 0 0 auto;    /* shrink-wraps around tab bar + iframe */
      display: flex;
      flex-direction: column;
      border-radius: var(--radius);
      overflow: hidden;
      background: #121212;
      border: 1px solid rgba(0,0,0,0.4);
    }

    /* Fix Spotify panels height — flex-basis overrides the inherited flex:1 */
    .spotify-wrap .pod-panels {
      flex: 0 0 352px;
      height: 352px;
    }

    /* Tab bar on dark background */
    .spotify-wrap .pod-tabs {
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .spotify-wrap .pod-tab {
      color: rgba(255,255,255,0.45);
    }

    .spotify-wrap .pod-tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* Shift Spotify's green → our blue-gray palette via hue rotation */
    .spotify-player {
      filter: hue-rotate(66deg) saturate(0.75);
    }

    /* ── PODCASTS ── */

    .podcasts-card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: clip;   /* visual clip without killing child scroll on iOS */
    }

    .pod-tabs {
      display: flex;
      gap: 5px;
      padding: 11px 12px 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .pod-tab {
      flex: 1;
      padding: 6px 4px;
      border-radius: 9px;
      border: none;
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-tap-highlight-color: transparent;
    }

    .pod-tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* Shared panel container — Spotify keeps absolute-fill approach */
    .pod-panels {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    /* Spotify players: fill container via absolute positioning */
    .pod-player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .pod-player.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Podcast players: scrollable block — fixes iOS touch-scroll inside iframe */
    .podcasts-card .pod-panels {
      position: static;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .podcast-player {
      position: static;
      display: none;
      width: 100%;
      height: 480px;   /* artwork + several episodes, no excessive whitespace */
      opacity: 1;
      pointer-events: auto;
      transition: none;
    }

    .podcast-player.active {
      display: block;
    }

    /* ── PHOTOS (removed) ── */

    .photo-card {
      display: none; flex: 1;
      min-height: 0;
      position: relative;
    }

    .photo-inner {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      overflow: hidden;
      background: linear-gradient(145deg, var(--accent-lt), var(--accent));
    }

    .photo-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.6s ease;
    }

    .photo-img.visible { opacity: 1; }

    .photo-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      color: rgba(255,255,255,0.85);
    }

    .photo-fallback-icon { font-size: 34px; opacity: 0.7; }
    .photo-fallback-label { font-size: 13px; font-weight: 500; letter-spacing: 0.04em; }

    /* ── WEATHER WIDGET — iOS style ── */

    .weather-card {
      flex: 1;
      min-height: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(160deg, #1c3d7a 0%, #2e6bbf 55%, #4a8fd4 100%);
      transition: background 1s ease;
      border: none;
      position: relative;
    }

    .wx-inner {
      position: absolute;
      inset: 0;
      padding: 14px 16px 12px;
      display: flex;
      gap: 12px;
      color: #fff;
    }

    /* Left: location + big temp + condition */
    .wx-left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 0 0 auto;
      min-width: 130px;
    }

    .wx-location {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .wx-temp-big {
      font-size: 72px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .wx-bottom-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .wx-cond {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.9;
    }

    .wx-hl {
      font-size: 12px;
      font-weight: 500;
      opacity: 0.65;
    }

    /* Divider */
    .wx-divider {
      width: 1px;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      margin: 4px 0;
    }

    /* Right: vertical hourly list */
    .wx-hourly {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .wx-hourly::-webkit-scrollbar { display: none; }

    .wx-hour {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wx-h-time {
      font-size: 11px;
      font-weight: 500;
      opacity: 0.7;
      width: 36px;
      flex-shrink: 0;
    }

    .wx-h-icon { font-size: 16px; flex-shrink: 0; }

    .wx-h-temp {
      font-size: 13px;
      font-weight: 500;
      margin-left: auto;
    }

    body.night .weather-card {
      background: linear-gradient(160deg, #0e1e3d 0%, #182e5a 55%, #1f4070 100%);
    }

    .weather-loading {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      padding: 8px 0;
    }

    /* ── AI CHAT ── */

    .chat-card {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    .chat-tabs {
      display: flex;
      gap: 5px;
      padding: 10px 12px 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .chat-tab {
      flex: 1;
      padding: 6px 4px;
      border-radius: 9px;
      border: none;
      font-size: 11px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .chat-tab.active { background: var(--accent); color: #fff; }

    .chat-messages {
      min-height: 64px;
      max-height: 110px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .chat-placeholder {
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
      text-align: center;
      align-self: center;
      margin: auto 0;
    }

    .chat-bubble {
      padding: 7px 10px;
      border-radius: 11px;
      font-size: 12px;
      line-height: 1.45;
      max-width: 92%;
      word-break: break-word;
    }

    .chat-bubble.user {
      background: var(--accent);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }

    .chat-bubble.assistant {
      background: rgba(127,163,190,0.15);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 3px;
    }

    .chat-bubble.loading { color: var(--muted); font-style: italic; }

    .chat-input-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.65);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
    }

    .chat-input:focus { border-color: var(--accent); }

    .chat-send {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .chat-send:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── SETTINGS ── */

    .settings-trigger {
      position: relative;
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0.45;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .settings-trigger:hover, .settings-trigger:active { opacity: 1; }

    .settings-panel {
      position: fixed;
      top: 54px;
      right: 14px;
      width: 300px;
      background: rgba(238,242,247,0.97);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      z-index: 201;
      box-shadow: 0 8px 40px rgba(42,61,82,0.18);
      display: none;
    }

    .settings-panel.open { display: block; }

    .s-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
    }

    .s-section {
      margin-bottom: 14px;
    }

    .s-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      display: block;
      margin-bottom: 5px;
    }

    .s-input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.85);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      margin-bottom: 6px;
    }

    .s-input:focus { border-color: var(--accent); }

    .s-file-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px;
      border-radius: 10px;
      border: 1px dashed var(--accent-lt);
      background: rgba(127,163,190,0.08);
      color: var(--muted);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 6px;
      transition: background 0.15s;
    }

    .s-file-label:hover { background: rgba(127,163,190,0.16); }

    #bg-file { display: none; }

    .s-row {
      display: flex;
      gap: 7px;
    }

    .btn {
      flex: 1;
      padding: 8px;
      border-radius: 10px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: rgba(127,163,190,0.15); color: var(--muted); }

    .s-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 0;
    }
  </style>
</head>
<body>

  <div class="shell">

    <!-- HEADER -->
    <header class="header">
      <div class="header-date" id="date-display">—</div>
      <div class="header-clock" id="clock-display">—</div>
      <div class="header-location">
        <span>Brooklyn, NY</span>
        <button class="settings-trigger" id="settings-btn" aria-label="Settings">⚙</button>
      </div>
    </header>

    <!-- MAIN GRID -->
    <div class="main">

      <!-- LEFT COLUMN -->
      <div class="col">

        <!-- Spotify: tabbed playlists -->
        <div class="spotify-wrap">
          <div class="pod-tabs" id="spotify-tabs">
            <button class="pod-tab active" data-idx="0" title="">Playlist 1</button>
            <button class="pod-tab"        data-idx="1" title="">Playlist 2</button>
            <button class="pod-tab"        data-idx="2" title="">Playlist 3</button>
            <button class="pod-tab"        data-idx="3" title="">Playlist 4</button>
          </div>
          <div class="pod-panels" id="spotify-panels">
            <iframe class="pod-player spotify-player active"
              src="https://open.spotify.com/embed/playlist/50hFiVZysrkzXjUq1J67JZ?utm_source=generator"
              frameborder="0" allowfullscreen loading="lazy"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
            <iframe class="pod-player spotify-player"
              src="https://open.spotify.com/embed/playlist/0vPhkZm5Rw9pBNJJqBy6DL?utm_source=generator"
              frameborder="0" allowfullscreen loading="lazy"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
            <iframe class="pod-player spotify-player"
              src="https://open.spotify.com/embed/playlist/7andkYPK1ycMjXk6AUOTaJ?utm_source=generator"
              frameborder="0" allowfullscreen loading="lazy"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
            <iframe class="pod-player spotify-player"
              src="https://open.spotify.com/embed/playlist/1kqpsHewuB8XXWPoXnrqoJ?utm_source=generator"
              frameborder="0" allowfullscreen loading="lazy"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
          </div>
        </div>

        <!-- Weather Widget -->
        <div class="card weather-card" id="weather-card">
          <div id="weather-content" class="wx-inner">
            <div class="weather-loading">Loading weather…</div>
          </div>
        </div>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="col">

        <!-- Podcasts -->
        <div class="card podcasts-card">
          <div class="pod-tabs" id="podcast-tabs">
            <button class="pod-tab active" data-idx="0">Insight CVV</button>
            <button class="pod-tab"        data-idx="1">Muppet Movie</button>
            <button class="pod-tab"        data-idx="2">70 Muppets</button>
          </div>
          <div class="pod-panels" id="podcast-panels">
            <iframe class="pod-player podcast-player active"
              src="https://embed.podcasts.apple.com/us/podcast/insight-with-chris-van-vliet/id1468939064?theme=light"
              allow="autoplay *; encrypted-media *; clipboard-write" loading="lazy"></iframe>
            <iframe class="pod-player podcast-player"
              src="https://embed.podcasts.apple.com/us/podcast/movin-right-along-a-muppet-movie-podcast/id1318553877?theme=light"
              allow="autoplay *; encrypted-media *; clipboard-write" loading="lazy"></iframe>
            <iframe class="pod-player podcast-player"
              src="https://embed.podcasts.apple.com/us/podcast/70-years-70-muppets/id1763852606?theme=light"
              allow="autoplay *; encrypted-media *; clipboard-write" loading="lazy"></iframe>
          </div>
        </div>

        <!-- AI Chat -->
        <div class="card chat-card">
          <div class="chat-tabs">
            <button class="chat-tab active" data-model="claude">Claude</button>
            <button class="chat-tab" data-model="chatgpt">ChatGPT</button>
          </div>
          <div class="chat-messages" id="chat-messages">
            <div class="chat-placeholder" id="chat-placeholder">Add API keys in ⚙ to chat</div>
          </div>
          <div class="chat-input-row">
            <input class="chat-input" id="chat-input" type="text"
                   placeholder="Ask anything…" autocomplete="off">
            <button class="chat-send" id="chat-send">↑</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Settings panel -->
  <div class="settings-panel" id="settings-panel">
    <div class="s-title">Display Settings</div>

    <!-- Background -->
    <div class="s-section">
      <label class="s-label">Background</label>
      <label class="s-file-label" for="bg-file">
        <span>📁</span> Upload image from device
      </label>
      <input type="file" id="bg-file" accept="image/*">
      <input class="s-input" type="url" id="bg-url-input" placeholder="Or paste an image URL…">
    </div>

    <div class="s-divider"></div>

    <!-- AI API Keys -->
    <div class="s-section">
      <label class="s-label" for="claude-key-input">Claude API Key</label>
      <input class="s-input" type="password" id="claude-key-input" placeholder="sk-ant-…">
    </div>
    <div class="s-section">
      <label class="s-label" for="openai-key-input">OpenAI API Key</label>
      <input class="s-input" type="password" id="openai-key-input" placeholder="sk-…">
      <div style="font-size:10px;color:var(--muted);line-height:1.4;">
        Keys stored on this device only. Get them at
        <strong>console.anthropic.com</strong> and <strong>platform.openai.com</strong>.
      </div>
    </div>

    <div class="s-row">
      <button class="btn btn-primary" id="settings-save">Save</button>
      <button class="btn btn-ghost"   id="bg-clear">Clear BG</button>
    </div>
  </div>

  <script>
  'use strict';

  // ── CLOCK ─────────────────────────────────────────────────────
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  function tick() {
    const now = new Date();
    const h   = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    document.getElementById('clock-display').textContent = `${h%12||12}:${m} ${ampm}`;
    document.getElementById('date-display').textContent  =
      `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
  }
  tick();
  setInterval(tick, 1000);

  // ── NIGHT MODE — auto 9 PM → 7 AM ────────────────────────────
  function updateNightMode() {
    const h = new Date().getHours();
    document.body.classList.toggle('night', h >= 21 || h < 7);
  }
  updateNightMode();
  setInterval(updateNightMode, 60 * 1000);

  // ── WEATHER ───────────────────────────────────────────────────
  const WMO = {
    0:['☀️','Clear'], 1:['🌤','Mostly Clear'], 2:['⛅','Partly Cloudy'], 3:['☁️','Overcast'],
    45:['🌫','Foggy'], 48:['🌫','Icy Fog'],
    51:['🌦','Light Drizzle'], 53:['🌦','Drizzle'], 55:['🌧','Heavy Drizzle'],
    61:['🌧','Light Rain'], 63:['🌧','Rain'], 65:['🌧','Heavy Rain'],
    71:['❄️','Light Snow'], 73:['❄️','Snow'], 75:['❄️','Heavy Snow'],
    80:['🌦','Showers'], 81:['🌧','Showers'], 82:['⛈','Heavy Showers'],
    95:['⛈','Thunderstorm'], 96:['⛈','Thunderstorm'], 99:['⛈','Thunderstorm'],
  };

  function fmtHour(isoStr) {
    const h = new Date(isoStr).getHours();
    return h === 0 ? '12AM' : h < 12 ? `${h}AM` : h === 12 ? '12PM' : `${h-12}PM`;
  }

  function renderWeather(d) {
    const cur = d.current;
    const [icon, cond] = WMO[cur.weathercode] ?? ['🌡','—'];
    const temp   = Math.round(cur.temperature_2m);
    const hi     = Math.round(d.daily.temperature_2m_max[0]);
    const lo     = Math.round(d.daily.temperature_2m_min[0]);

    // Build next 6 hourly slots starting from current hour
    const now    = new Date();
    const curHr  = now.getHours();
    const times  = d.hourly.time;
    const temps  = d.hourly.temperature_2m;
    const codes  = d.hourly.weathercode;
    const start  = times.findIndex(t => new Date(t).getHours() >= curHr);
    const slots  = [];
    for (let i = start; i < start + 6 && i < times.length; i++) {
      const [hIcon] = WMO[codes[i]] ?? ['🌡'];
      slots.push({ time: fmtHour(times[i]), icon: hIcon, temp: Math.round(temps[i]) });
    }

    const hourlyHTML = slots.map(s => `
      <div class="wx-hour">
        <span class="wx-h-time">${s.time}</span>
        <span class="wx-h-icon">${s.icon}</span>
        <span class="wx-h-temp">${s.temp}°</span>
      </div>`).join('');

    document.getElementById('weather-content').innerHTML = `
      <div class="wx-left">
        <div class="wx-location">Brooklyn</div>
        <div class="wx-temp-big">${temp}°</div>
        <div class="wx-bottom-left">
          <div class="wx-cond">${icon} ${cond}</div>
          <div class="wx-hl">H:${hi}° L:${lo}°</div>
        </div>
      </div>
      <div class="wx-divider"></div>
      <div class="wx-hourly">${hourlyHTML}</div>
    `;
  }

  async function fetchWeather() {
    try {
      const res = await fetch(
        'https://api.open-meteo.com/v1/forecast' +
        '?latitude=40.6501&longitude=-73.9496' +
        '&current=temperature_2m,weathercode' +
        '&hourly=temperature_2m,weathercode' +
        '&daily=temperature_2m_max,temperature_2m_min' +
        '&temperature_unit=fahrenheit&timezone=America%2FNew_York&forecast_days=1'
      );
      const data = await res.json();
      renderWeather(data);
    } catch(e) {
      document.getElementById('weather-content').innerHTML =
        '<div class="weather-loading">Weather unavailable</div>';
    }
  }

  fetchWeather();
  setInterval(fetchWeather, 10 * 60 * 1000);

  // ── TAB SWITCHER (shared logic) ──────────────────────────────
  function initTabs(tabsId, panelsId) {
    const tabs    = document.querySelectorAll(`#${tabsId} .pod-tab`);
    const players = document.querySelectorAll(`#${panelsId} .pod-player`);
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const idx = parseInt(tab.dataset.idx);
        tabs.forEach(t => t.classList.remove('active'));
        players.forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        players[idx].classList.add('active');
      });
    });
    return tabs;
  }

  const spotifyTabs = initTabs('spotify-tabs', 'spotify-panels');
  initTabs('podcast-tabs', 'podcast-panels');

  // Fetch real playlist names from Spotify oEmbed
  const SPOTIFY_IDS = [
    '50hFiVZysrkzXjUq1J67JZ',
    '0vPhkZm5Rw9pBNJJqBy6DL',
    '7andkYPK1ycMjXk6AUOTaJ',
    '1kqpsHewuB8XXWPoXnrqoJ',
  ];

  (async () => {
    for (let i = 0; i < SPOTIFY_IDS.length; i++) {
      try {
        const r = await fetch(
          `https://open.spotify.com/oembed?url=https://open.spotify.com/playlist/${SPOTIFY_IDS[i]}`
        );
        const d = await r.json();
        if (d.title && spotifyTabs[i]) {
          const short = d.title.length > 14 ? d.title.slice(0, 12) + '…' : d.title;
          spotifyTabs[i].textContent = short;
          spotifyTabs[i].title = d.title;  // full name on long-press/hover
        }
      } catch(e) {}
    }
  })();


  // ── BACKGROUND SETTINGS ───────────────────────────────────────
  const BG_KEY = 'bathroom-bg';

  function applyBg(dataUrlOrSrc) {
    if (dataUrlOrSrc) {
      document.body.style.setProperty('--custom-bg', `url("${dataUrlOrSrc}")`);
      document.body.classList.add('has-bg');
    } else {
      document.body.style.removeProperty('--custom-bg');
      document.body.classList.remove('has-bg');
    }
  }

  // Restore saved state
  const CLAUDE_KEY = 'claude-api-key';
  const OPENAI_KEY = 'openai-api-key';

  const savedBg        = localStorage.getItem(BG_KEY);
  const savedClaudeKey = localStorage.getItem(CLAUDE_KEY);
  const savedOpenaiKey = localStorage.getItem(OPENAI_KEY);
  if (savedBg)        { applyBg(savedBg); document.getElementById('bg-url-input').value = savedBg.startsWith('data:') ? '' : savedBg; }
  if (savedClaudeKey) { document.getElementById('claude-key-input').value = savedClaudeKey; }
  if (savedOpenaiKey) { document.getElementById('openai-key-input').value = savedOpenaiKey; }
  if (savedClaudeKey || savedOpenaiKey) {
    document.getElementById('chat-placeholder').textContent = 'Ask me anything…';
  }

  // Settings panel toggle
  const settingsBtn   = document.getElementById('settings-btn');
  const settingsPanel = document.getElementById('settings-panel');
  settingsBtn.addEventListener('click', e => { e.stopPropagation(); settingsPanel.classList.toggle('open'); });
  document.addEventListener('click', e => {
    if (!settingsPanel.contains(e.target) && e.target !== settingsBtn)
      settingsPanel.classList.remove('open');
  });

  // File upload → base64
  document.getElementById('bg-file').addEventListener('change', function() {
    const file = this.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('bg-url-input').value = '';
      applyBg(e.target.result);
      localStorage.setItem(BG_KEY, e.target.result);
    };
    reader.readAsDataURL(file);
  });

  // Save button
  document.getElementById('settings-save').addEventListener('click', () => {
    // Background URL (if typed, not uploaded)
    const url = document.getElementById('bg-url-input').value.trim();
    if (url) { localStorage.setItem(BG_KEY, url); applyBg(url); }

    // AI API keys
    const ck = document.getElementById('claude-key-input').value.trim();
    const ok = document.getElementById('openai-key-input').value.trim();
    if (ck) { localStorage.setItem(CLAUDE_KEY, ck); } else { localStorage.removeItem(CLAUDE_KEY); }
    if (ok) { localStorage.setItem(OPENAI_KEY, ok); } else { localStorage.removeItem(OPENAI_KEY); }
    if (ck || ok) document.getElementById('chat-placeholder').textContent = 'Ask me anything…';

    settingsPanel.classList.remove('open');
  });

  // Clear background
  document.getElementById('bg-clear').addEventListener('click', () => {
    localStorage.removeItem(BG_KEY);
    document.getElementById('bg-url-input').value = '';
    document.getElementById('bg-file').value = '';
    applyBg(null);
    settingsPanel.classList.remove('open');
  });

  // ── AI CHAT ──────────────────────────────────────────────────
  let activeModel  = 'claude';
  const chatHistory = { claude: [], chatgpt: [] };

  document.querySelectorAll('.chat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeModel = tab.dataset.model;
      renderChat();
    });
  });

  function renderChat() {
    const box  = document.getElementById('chat-messages');
    const hist = chatHistory[activeModel];
    if (!hist.length) {
      const hasKey = activeModel === 'claude'
        ? localStorage.getItem(CLAUDE_KEY)
        : localStorage.getItem(OPENAI_KEY);
      box.innerHTML = `<div class="chat-placeholder">${hasKey ? 'Ask me anything…' : 'Add API key in ⚙ to chat'}</div>`;
      return;
    }
    box.innerHTML = hist.map(m =>
      `<div class="chat-bubble ${m.role === 'user' ? 'user' : 'assistant'}">${m.content}</div>`
    ).join('');
    box.scrollTop = box.scrollHeight;
  }

  async function sendChat() {
    const input   = document.getElementById('chat-input');
    const sendBtn = document.getElementById('chat-send');
    const text    = input.value.trim();
    if (!text) return;

    const claudeKey = localStorage.getItem(CLAUDE_KEY);
    const openaiKey = localStorage.getItem(OPENAI_KEY);

    if (activeModel === 'claude' && !claudeKey) {
      document.getElementById('chat-placeholder').textContent = 'Add Claude API key in ⚙ Settings';
      return;
    }
    if (activeModel === 'chatgpt' && !openaiKey) {
      document.getElementById('chat-placeholder').textContent = 'Add OpenAI API key in ⚙ Settings';
      return;
    }

    chatHistory[activeModel].push({ role: 'user', content: text });
    input.value  = '';
    sendBtn.disabled = true;
    renderChat();

    // Loading indicator
    const box = document.getElementById('chat-messages');
    const dot = document.createElement('div');
    dot.className = 'chat-bubble loading';
    dot.textContent = '…';
    box.appendChild(dot);
    box.scrollTop = box.scrollHeight;

    try {
      let reply = '';

      if (activeModel === 'claude') {
        const r = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': claudeKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 512,
            system: 'You are a helpful assistant. Keep responses concise.',
            messages: chatHistory[activeModel].map(m => ({ role: m.role, content: m.content })),
          }),
        });
        const d = await r.json();
        reply = d.content?.[0]?.text ?? `Error: ${d.error?.message ?? 'unknown'}`;
      } else {
        const r = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${openaiKey}`,
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            max_tokens: 512,
            messages: [
              { role: 'system', content: 'You are a helpful assistant. Keep responses concise.' },
              ...chatHistory[activeModel].map(m => ({ role: m.role, content: m.content })),
            ],
          }),
        });
        const d = await r.json();
        reply = d.choices?.[0]?.message?.content ?? `Error: ${d.error?.message ?? 'unknown'}`;
      }

      chatHistory[activeModel].push({ role: 'assistant', content: reply });
      // Keep last 6 messages (3 exchanges)
      if (chatHistory[activeModel].length > 6)
        chatHistory[activeModel] = chatHistory[activeModel].slice(-6);

    } catch(e) {
      chatHistory[activeModel].push({ role: 'assistant', content: `⚠️ ${e.message}` });
    }

    sendBtn.disabled = false;
    renderChat();
  }

  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
  </script>
</body>
</html>
